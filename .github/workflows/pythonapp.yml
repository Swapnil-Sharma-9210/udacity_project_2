name: Python application test with Github Actions

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Verify Python version
      run: python --version

    - name: Install dependencies
      run: make install

    - name: Lint
      run: make lint

    - name: Test
      run: make test
